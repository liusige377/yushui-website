<!DOCTYPE html>

<style>
:root{--bg:#0d1117;--bg2:#161b22;--gold:#d4a843;--white:#f0f6fc;--text:#c9d1d9;--text2:#8b949e;--green:#3fb950;--font:"PingFang SC","Microsoft YaHei",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
.back-bar{padding:16px 20px}
.back-bar a{color:var(--gold);text-decoration:none;font-size:0.9rem}
.hero-section{text-align:center;padding:20px 20px 10px}
.hero-section h1{font-size:clamp(1.6rem,4vw,2.2rem);color:var(--white);margin-bottom:8px}
.hero-section p{color:var(--text2);font-size:0.95rem;margin-bottom:30px}
.main-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 20px 40px}
.draw-stage{width:200px;height:260px;position:relative;margin-bottom:30px;cursor:pointer}
.shake{animation:shake 0.6s ease}
@keyframes shake{0%,100%{transform:rotate(0deg)}15%{transform:rotate(-15deg)}30%{transform:rotate(12deg)}45%{transform:rotate(-10deg)}60%{transform:rotate(8deg)}75%{transform:rotate(-5deg)}}
.result-reveal{text-align:center;display:none;max-width:500px;width:100%}
.result-reveal.show{display:block;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.fortune-level{font-size:0.85rem;padding:4px 14px;border-radius:20px;display:inline-block;margin-bottom:12px;font-weight:600}
.level-0{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a1a0a}
.level-1{background:linear-gradient(135deg,#90ee90,#228b22);color:#0a1a0a}
.level-2{background:linear-gradient(135deg,#87ceeb,#4169e1);color:#0a0a2a}
.level-3{background:linear-gradient(135deg,#dda0dd,#9370db);color:#1a0a1a}
.level-4{background:rgba(255,255,255,0.1);color:var(--text2)}
.fortune-title{font-size:clamp(1.4rem,4vw,2rem);font-weight:700;color:var(--gold);margin-bottom:8px}
.fortune-date{color:var(--text2);font-size:0.82rem;margin-bottom:20px}
.fortune-main{background:var(--bg2);border-radius:14px;padding:24px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.08);text-align:left;line-height:1.9;color:var(--white)}
.fortune-detail{background:var(--bg2);border-radius:14px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.08)}
.fortune-detail-title{font-size:0.85rem;color:var(--gold);margin-bottom:10px;font-weight:600}
.fortune-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item{background:var(--bg);border-radius:8px;padding:10px 12px}
.detail-item .di-label{font-size:0.75rem;color:var(--text2);margin-bottom:4px}
.detail-item .di-val{font-size:0.9rem;color:var(--white);font-weight:500}
.detail-item .di-val.good{color:var(--gold)}
.reminder-bar{margin-top:16px;padding:12px 18px;background:rgba(212,168,67,0.08);border:1px solid rgba(212,168,67,0.2);border-radius:10px;color:var(--text2);font-size:0.8rem;text-align:center;line-height:1.6}
.reminder-bar span{color:var(--gold)}
.draw-btn{background:linear-gradient(135deg,var(--gold),#b8922e);color:#1a1000;border:none;padding:16px 50px;font-size:1.15rem;font-weight:700;border-radius:50px;cursor:pointer;font-family:inherit;margin-bottom:20px;box-shadow:0 4px 20px rgba(212,168,67,0.35);transition:transform .15s,box-shadow .15s}
.draw-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(212,168,67,0.5)}
.draw-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
@media(max-width:500px){.fortune-detail-grid{grid-template-columns:1fr}}
</style>
</head>
